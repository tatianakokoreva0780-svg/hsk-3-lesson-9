<body>
<div class="wrap">
  <header>
    <h1>根据实际情况回答</h1>
    <div class="tag">每一句选一个合适的说法</div>
  </header>

  <div class="card">
    <div class="rule"><b>想一想：</b>这句话后面应该说“越来越……”什么？每一句的选择不一样。</div>

    <div id="grid" class="grid"></div>

    <div class="btns">
      <button class="check" onclick="checkAll()">检查</button>
      <button class="reset" onclick="resetAll()">重做</button>
    </div>
    <div id="msg" class="msg"></div>
  </div>
</div>

<script>

function speakText(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = 0.88;
  u.pitch = 1;
  window.speechSynthesis.speak(u);
}

function speakItem(btn){
  const item = btn.closest('.item');
  const start = item.querySelector('select').dataset.start;
  const value = item.querySelector('select').value;
  const text = value ? start + value + '。' : start;
  speakText(text);
}

const items = [
  {
    start:"我现在吃得",
    options:["越来越多","越来越少","越来越健康","越来越有规律"]
  },
  {
    start:"我汉语说得",
    options:["越来越流利","越来越准确","越来越像中国人","越来越有信心"]
  },
  {
    start:"我觉得语法",
    options:["越来越容易","越来越有意思","越来越清楚","越来越复杂"]
  },
  {
    start:"我做的饭",
    options:["越来越好吃","越来越香","越来越像饭店做的","越来越让人放心"]
  },
  {
    start:"我跑步跑得",
    options:["越来越快","越来越轻松","越来越不累"]
  },
  {
    start:"我打篮球打得",
    options:["越来越好","越来越熟练","越来越准","越来越有信心"]
  }
];

const grid = document.getElementById("grid");

items.forEach((it, i)=>{
  const div = document.createElement("div");
  div.className = "item";
  div.innerHTML = `
    <button class="speak-btn" onclick="speakItem(this)">🔊</button>
    <div class="situation">${i+1}. ${it.start}<span class="chosen"></span></div>
    <div class="answerline">
      <select data-start="${it.start}" onchange="updatePreview(this)">
        <option value="">请选择……</option>
        ${it.options.map(op=>`<option value="${op}">${op}</option>`).join("")}
      </select>
    </div>
  `;
  grid.appendChild(div);
});

function updatePreview(sel){
  const chosen = sel.closest(".item").querySelector(".chosen");
  chosen.textContent = sel.value ? sel.value + "。" : "";
}

function checkAll(){
  const selects = document.querySelectorAll("select");
  let done = 0;
  selects.forEach(sel=>{
    if(sel.value){
      done++;
      sel.style.borderColor = "#16a34a";
    }else{
      sel.style.borderColor = "#dc2626";
    }
  });
  const msg = document.getElementById("msg");
  if(done === selects.length){
    msg.innerHTML = '<span class="ok">完成了！请读一读自己的六个句子。</span>';
  }else{
    msg.innerHTML = '<span class="no">还有句子没有选。</span>';
  }
}

function resetAll(){
  document.querySelectorAll("select").forEach(sel=>{
    sel.value = "";
    sel.style.borderColor = "#14b8a6";
    updatePreview(sel);
  });
  document.getElementById("msg").innerHTML = "";
}
</script>
</body>
</html>
