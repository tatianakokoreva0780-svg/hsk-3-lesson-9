.wrap{
  max-width:1440px;
  margin:0 auto;
  padding:18px;
}
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}
h1{
  margin:0;
  font-size:48px;
  color:#ffffff;text-shadow:0 3px 8px rgba(0,0,0,.75);
  letter-spacing:1px;
}
.tabs{
  display:flex;
  gap:12px;
  margin:12px 0;
  flex-wrap:wrap;
}
.tab{
  font-family:inherit;
  font-size:28px;
  font-weight:bold;
  border:3px solid #fff;
  border-radius:18px;
  padding:10px 28px;
  cursor:pointer;
  background:#fff7a8;
  color:#1e3a8a;
  box-shadow:0 5px 14px rgba(15,23,42,.14);
}
.tab.active{
  background:#2563eb;
  color:#fff;
}
.card{
  background:rgba(255,255,255,.88);
  border:3px solid #ffffff;
  border-radius:28px;
  padding:18px 30px;
  box-shadow:0 10px 26px rgba(15,23,42,.22);backdrop-filter:blur(2px);
}
.panel{display:none}
.panel.active{display:block}
.grammar-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}
.box{
  background:#fffdf3;
  border:4px solid #22c55e;
  border-radius:24px;
  padding:18px;
}
.title{
  font-size:36px;
  color:#166534;
  font-weight:bold;
  margin-bottom:10px;
}
.formula{
  font-size:38px;
  line-height:1.5;
  text-align:center;
  background:#e0f2fe;
  border:3px solid #38bdf8;
  border-radius:20px;
  padding:12px 58px 12px 14px;
  color:#075985;
  font-weight:bold;
}
.ex{
  font-size:33px;
  line-height:1.7;
  margin:9px 0;
}
.red{color:#dc2626;font-weight:bold}
.blue{color:#2563eb;font-weight:bold}
.green{color:#16a34a;font-weight:bold}
.practice-list{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}
.item{
  background:#fffdf3;
  border:4px solid #22c55e;
  border-radius:22px;
  padding:16px;
}
.line{
  font-size:36px;
  line-height:1.55;
}
select{
  font-family:inherit;
  font-size:32px;
  min-width:300px;
  max-width:100%;
  border:4px solid #2563eb;
  border-radius:16px;
  background:#ffffff;
  color:#102a43;
  padding:8px 12px;
  outline:none;
  cursor:pointer;
}
select.correct{
  border-color:#16a34a;
  background:#dcfce7;
}
select.wrong{
  border-color:#dc2626;
  background:#fee2e2;
}
.actions{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:18px;
  flex-wrap:wrap;
}
button.action{
  font-family:inherit;
  font-size:29px;
  border:0;
  border-radius:18px;
  padding:12px 30px;
  color:#fff;
  cursor:pointer;
  box-shadow:0 6px 14px rgba(15,23,42,.18);
}
.check{background:#16a34a}
.reset{background:#f97316}
.msg{
  text-align:center;
  min-height:38px;
  font-size:31px;
  font-weight:bold;
  margin-top:12px;
}
.ok{color:#16a34a}
.no{color:#dc2626}
@media(max-width:850px){
  .grammar-grid{grid-template-columns:1fr}
  h1{font-size:40px}
  .line,.ex,.formula{font-size:30px}
  select{font-size:28px;min-width:230px}
}

.drag-area{display:flex;flex-direction:column;gap:12px}
.drop-bank{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;background:#e0f2fe;border:3px solid #38bdf8;border-radius:20px;padding:12px;min-height:76px}
.chip{display:inline-flex;align-items:center;justify-content:center;background:#fff7a8;border:3px solid #f59e0b;border-radius:999px;padding:8px 16px;font-size:31px;color:#7c2d12;cursor:grab;user-select:none;box-shadow:0 4px 10px rgba(15,23,42,.12);white-space:nowrap}
.chip:active{cursor:grabbing}
.drag-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.drag-item{background:#fffdf3;border:4px solid #22c55e;border-radius:22px;padding:12px 58px 12px 14px;min-height:112px}
.drag-item.center{grid-column:1 / 3;width:56%;justify-self:center}
.sentence{font-size:34px;line-height:1.35;color:#102a43}
.drop{display:inline-flex;align-items:center;justify-content:center;min-width:220px;min-height:54px;border:4px dashed #2563eb;border-radius:16px;background:#ffffff;vertical-align:middle;padding:4px 8px}
.drop.over{background:#dbeafe}
.drop.correct{border-style:solid;border-color:#16a34a;background:#dcfce7}
.drop.wrong{border-style:solid;border-color:#dc2626;background:#fee2e2}
.drop .chip{font-size:30px;padding:5px 10px;box-shadow:none}
@media(max-width:850px){.drag-grid{grid-template-columns:1fr}.drag-item.center{grid-column:auto;width:100%}.sentence{font-size:30px}.chip{font-size:27px}.drop{min-width:210px}}


.bank-hint{
  font-size:31px;
  color:#075985;
  font-weight:bold;

}
.drop.active{
  border-color:#f97316;

}
.drag-item.active{

  border:3px solid #f59e0b;

  cursor:pointer;

}
@media(max-width:850px){
  .option-chip,.bank-hint{font-size:27px}
  .drop .answer-text{font-size:27px}

.sound-row{
  display:flex;
  justify-content:center;
  margin-top:10px;
}
.sound-btn{
  font-family:inherit;
  font-size:27px;
  border:0;
  border-radius:18px;
  padding:10px 26px;
  color:#fff;
  background:#2563eb;
  cursor:pointer;
  box-shadow:0 6px 14px rgba(15,23,42,.18);
}

  cursor:grab;
}
.option-chip:active{
  cursor:grabbing;
}

  background:#dbeafe;
  border-color:#f97316;
}

  position:relative;
}
.item-sound-btn{
  position:absolute;
  top:10px;
  right:10px;
  width:42px;
  height:42px;
  min-width:42px;
  border:3px solid #ffffff;
  border-radius:999px;
  background:#2563eb;
  color:#ffffff;
  font-size:19px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(15,23,42,.18);
  padding:0;
}
.item-sound-btn:hover{
  background:#1d4ed8;
}
.sentence{
  white-space:nowrap;
}

  gap:12px 16px;
}

  max-width:100%;
}
.drag-grid{
  grid-template-columns:1fr 1fr;
  gap:12px 18px;
}

  overflow:hidden;
  cursor:pointer;
}

  max-width:62%;
  overflow:hidden;
}

  max-width:100%;
  display:inline-block;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-size:28px;
}

  white-space:nowrap;
  overflow:hidden;
  text-overflow:clip;
  padding-right:48px;
}

  .sentence{white-space:normal;overflow:visible}
  .drop{max-width:100%}
  .drop .answer-text{white-space:normal}
}


/* active-card highlight: not red/orange */
.drag-item.active{
  border-color:#2563eb!important;
  background:#e0f2fe!important;
  box-shadow:0 0 0 5px rgba(37,99,235,.22), 0 8px 18px rgba(15,23,42,.12)!important;
}
.drop.active{
  border-color:#2563eb!important;
  background:#eff6ff!important;
  box-shadow:0 0 0 4px rgba(37,99,235,.18)!important;
}
.drag-item.active .sentence{
  color:#0f172a!important;
}

</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>A跟B一样</h1>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="grammar">语法</button>
    <button class="tab" data-tab="practice">练习</button>
  </div>

  <div class="card">
    <section class="panel active" id="grammar">
      <div class="grammar-grid">
        <div class="box">
          <div class="title">意思</div>
          <div class="ex"><span class="blue">A跟B一样</span> 表示：A和B比较以后，结果相同。</div>
          <div class="ex">后面可以加形容词，说明哪一方面相同。</div>
        </div>

        <div class="box">
          <div class="title">句型</div>
          <div class="formula">
            A 跟 B 一样<br>
            A 跟 B 一样 + 形容词<br>
            A 跟 B 不一样
          </div>
        </div>

        <div class="box">
          <div class="title">例句</div>
          <div class="ex">这本书<span class="red">跟</span>那本书<span class="red">一样</span>。</div>
          <div class="ex">儿子<span class="red">跟</span>爸爸<span class="red">一样高</span>。</div>
          <div class="ex">她的汉语说得<span class="red">跟</span>中国人<span class="red">一样好</span>。</div>
        </div>

        <div class="box">
          <div class="title">否定</div>
          <div class="ex">否定式：<span class="red">不</span> 放在 <span class="blue">一样</span> 前面。</div>
          <div class="ex">这辆车的颜色<span class="red">跟</span>那辆车<span class="red">不一样</span>。</div>
        </div>
      </div>
    </section>

    <section class="panel" id="practice">
      <div class="drag-area">
        <div class="drop-bank" id="bank">
          <div class="bank-hint">先点一个句子里的空格</div>
        </div>

        <div class="drag-grid">
          <div class="drag-item" data-target="q1">
            <button class="item-sound-btn" onclick="event.stopPropagation(); speakById('q1')">🔊</button>
            <div class="sentence">1. 我的杯子 <span class="drop" data-id="q1" data-answers="跟你的杯子一样|跟你的杯子不一样|跟你的杯子一样大|跟你的杯子一样漂亮"></span>。</div>
          </div>

          <div class="drag-item" data-target="q2">
            <button class="item-sound-btn" onclick="event.stopPropagation(); speakById('q2')">🔊</button>
            <div class="sentence">2. 今天的生词 <span class="drop" data-id="q2" data-answers="跟昨天的生词一样多|跟昨天的生词不一样|跟昨天的生词一样难|跟昨天的生词一样重要"></span>。</div>
          </div>

          <div class="drag-item" data-target="q3">
            <button class="item-sound-btn" onclick="event.stopPropagation(); speakById('q3')">🔊</button>
            <div class="sentence">3. <span class="drop" data-id="q3" data-answers="他跟哥哥|女儿跟妈妈|小明跟小红|她跟老师"></span> 一样聪明。</div>
          </div>

          <div class="drag-item" data-target="q4">
            <button class="item-sound-btn" onclick="event.stopPropagation(); speakById('q4')">🔊</button>
            <div class="sentence">4. 这件衣服 <span class="drop" data-id="q4" data-answers="跟那件衣服一样|跟那件衣服不一样|跟那件衣服一样贵|跟那件衣服一样好看"></span>。</div>
          </div>

          <div class="drag-item center" data-target="q5">
            <button class="item-sound-btn" onclick="event.stopPropagation(); speakById('q5')">🔊</button>
            <div class="sentence">5. 我的汉语说得 <span class="drop" data-id="q5" data-answers="跟中国人一样好|跟老师一样流利|跟同学一样快|跟以前不一样"></span>。</div>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="action check" onclick="checkAll()">检查</button>
        <button class="action reset" onclick="resetAll()">重做</button>
      </div>
      <div id="msg" class="msg"></div>
    </section>
  </div>
</div>

<script>
let activeDrop = null;
let draggedText = null;

const optionsById = {
  q1: ["跟你的杯子一样", "跟你的杯子不一样", "跟你的杯子一样大", "跟你的杯子一样漂亮"],
  q2: ["跟昨天的生词一样多", "跟昨天的生词不一样", "跟昨天的生词一样难", "跟昨天的生词一样重要"],
  q3: ["他跟哥哥", "女儿跟妈妈", "小明跟小红", "她跟老师"],
  q4: ["跟那件衣服一样", "跟那件衣服不一样", "跟那件衣服一样贵", "跟那件衣服一样好看"],
  q5: ["跟中国人一样好", "跟老师一样流利", "跟同学一样快", "跟以前不一样"]
};

const sentenceParts = {
  q1: {before:"我的杯子", after:"。"},
  q2: {before:"今天的生词", after:"。"},
  q3: {before:"", after:"一样聪明。"},
  q4: {before:"这件衣服", after:"。"},
  q5: {before:"我的汉语说得", after:"。"}
};

document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
    document.getElementById('msg').innerHTML = '';
  });
});

function setActiveDrop(drop){
  activeDrop = drop;
  document.querySelectorAll('.drop').forEach(d=>d.classList.remove('active'));
  document.querySelectorAll('.drag-item').forEach(item=>item.classList.remove('active'));
  drop.classList.add('active');
  drop.closest('.drag-item').classList.add('active');
  renderBank(drop.dataset.id);
}

function chooseText(text){
  if(!activeDrop) return;
  activeDrop.innerHTML = '<span class="answer-text">' + text + '</span>';
  activeDrop.dataset.value = text;
  activeDrop.classList.remove('correct','wrong');
}

function renderBank(id){
  const bank = document.getElementById('bank');
  bank.innerHTML = '';
  optionsById[id].forEach(text=>{
    const chip = document.createElement('div');
    chip.className = 'option-chip';
    chip.textContent = text;
    chip.draggable = true;
    chip.dataset.text = text;

    chip.onclick = ()=> chooseText(text);

    chip.addEventListener('dragstart', e=>{
      draggedText = text;
      e.dataTransfer.setData('text/plain', text);
    });
    chip.addEventListener('dragend', ()=> draggedText = null);

    bank.appendChild(chip);
  });
}


document.querySelectorAll('.drag-item[data-target]').forEach(item=>{
  item.addEventListener('click',()=>{
    const id = item.dataset.target;
    const drop = document.querySelector('.drop[data-id="' + id + '"]');
    if(drop) setActiveDrop(drop);
  });
});


document.querySelectorAll('.drop').forEach(drop=>{
  drop.addEventListener('click',()=>setActiveDrop(drop));

  drop.addEventListener('dragover', e=>{
    e.preventDefault();
    drop.classList.add('over');
  });

  drop.addEventListener('dragleave', ()=>{
    drop.classList.remove('over');
  });

  drop.addEventListener('drop', e=>{
    e.preventDefault();
    drop.classList.remove('over');
    const text = e.dataTransfer.getData('text/plain') || draggedText;
    if(!text) return;

    setActiveDrop(drop);
    const allowed = optionsById[drop.dataset.id] || [];
    if(allowed.includes(text)){
      chooseText(text);
    }
  });
});

function getSentenceText(drop){
  const id = drop.dataset.id;
  const value = drop.dataset.value || '……';
  const p = sentenceParts[id];
  if(!p) return value;
  if(id === 'q3'){
    return value + p.after;
  }
  return p.before + value + p.after;
}

function speakText(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = 0.86;
  window.speechSynthesis.speak(u);
}

function speakActive(){
  if(!activeDrop){
    speakText('请先选择一个句子。');
    return;
  }
  speakText(getSentenceText(activeDrop));
}

function speakById(id){
  const drop = document.querySelector('.drop[data-id="' + id + '"]');
  if(drop){
    setActiveDrop(drop);
    speakText(getSentenceText(drop));
  }
}

function checkAll(){
  const drops = [...document.querySelectorAll('.drop')];
  let correct = 0;
  drops.forEach(drop=>{
    drop.classList.remove('correct','wrong');
    const value = drop.dataset.value || '';
    const answers = drop.dataset.answers.split('|');
    if(value && answers.includes(value)){
      drop.classList.add('correct');
      correct++;
    }else{
      drop.classList.add('wrong');
    }
  });
  const msg = document.getElementById('msg');
  if(correct === drops.length){
    msg.innerHTML = '<span class="ok">全对！</span>';
  }else{
    msg.innerHTML = '<span class="no">答对 ' + correct + ' / ' + drops.length + '。再试一次。</span>';
  }
}

function resetAll(){
  
document.querySelectorAll('.drag-item[data-target]').forEach(item=>{
  item.addEventListener('click',()=>{
    const id = item.dataset.target;
    const drop = document.querySelector('.drop[data-id="' + id + '"]');
    if(drop) setActiveDrop(drop);
  });
});


document.querySelectorAll('.drop').forEach(drop=>{
    drop.innerHTML = '';
    drop.dataset.value = '';
    drop.classList.remove('correct','wrong','active','over');
  });
  document.querySelectorAll('.drag-item').forEach(item=>item.classList.remove('active'));
  activeDrop = null;
  draggedText = null;
  document.getElementById('bank').innerHTML = '<div class="bank-hint">先点一个句子里的空格</div>';
  document.getElementById('msg').innerHTML = '';
  if('speechSynthesis' in window) window.speechSynthesis.cancel();
}
</script>
</body>
</html>
