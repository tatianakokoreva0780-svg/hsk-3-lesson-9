<script>
function playClickSound() {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    const ctx = new AudioCtx();
    const oscillator = ctx.createOscillator();
    const gainNode = ctx.createGain();

    oscillator.type = "triangle";
    oscillator.frequency.setValueAtTime(660, ctx.currentTime);
    oscillator.frequency.exponentialRampToValueAtTime(520, ctx.currentTime + 0.08);

    gainNode.gain.setValueAtTime(0.0001, ctx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.08, ctx.currentTime + 0.01);
    gainNode.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.10);

    oscillator.connect(gainNode);
    gainNode.connect(ctx.destination);

    oscillator.start();
    oscillator.stop(ctx.currentTime + 0.10);

    setTimeout(() => {
      if (ctx.state !== "closed") ctx.close();
    }, 180);
  } catch (e) {
    console.log("Sound playback blocked:", e);
  }
}

document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", (event) => {
      const href = card.getAttribute("href");
      if (!href) return;
      event.preventDefault();
      playClickSound();
      setTimeout(() => {
        window.location.href = href;
      }, 110);
    });
  });
});
</script>
