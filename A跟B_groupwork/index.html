.wrap{
  height:100vh;
  max-width:1500px;
  margin:0 auto;
  padding:10px 14px;
  display:grid;
  grid-template-rows:auto auto 1fr auto auto;
  gap:8px;
}
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
h1{
  margin:0;
  font-size:42px;
  color:#1e3a8a;
}
.actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
button{
  font-family:inherit;
  cursor:pointer;
}
.top-btn{
  border:0;
  border-radius:14px;
  padding:7px 16px;
  font-size:22px;
  font-weight:bold;
  color:white;
  box-shadow:0 4px 10px rgba(15,23,42,.14);
}
.save{background:#0f766e}
.speak{background:#2563eb}
.stop{background:#6d28d9}
.check{background:#16a34a}
.reset{background:#f97316}



.workspace{
  min-height:0;
  display:grid;
  grid-template-columns:1fr 420px;
  gap:12px;
}
.sheet{
  min-height:0;
  background:rgba(255,251,240,.94);
  border:3px solid #e8d9b5;
  border-radius:22px;
  padding:12px;
  box-shadow:0 8px 20px rgba(15,23,42,.12);
  display:grid;
  grid-template-rows:auto 1fr;
  gap:8px;
}
.sheet-title{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:10px;
}
.sheet-title strong{
  font-size:30px;
  color:#1e3a8a;
}
.sheet-title span{
  font-size:22px;
  color:#64748b;
}
.table{
  min-height:0;
  display:grid;
  grid-template-rows:44px repeat(6,1fr);
  border:3px solid #94a3b8;
  border-radius:14px;
  overflow:hidden;
  background:#fff;
}
.row{
  display:grid;
  grid-template-columns:1.03fr 1.18fr .92fr 1.18fr;
}
.head .cell{
  background:#e2e8f0;
  font-size:25px;
  font-weight:bold;
  color:#1e293b;
  justify-content:center;
}
.cell{
  border-right:2px dashed #cbd5e1;
  border-bottom:2px solid #e2e8f0;
  padding:6px 8px;
  display:flex;
  align-items:center;
  min-width:0;
  font-size:25px;
  line-height:1.18;
}
.row .cell:last-child{border-right:0}
.row:last-child .cell{border-bottom:0}
.data-row{
  cursor:pointer;
}
.data-row.active .cell{
  background:#eff6ff;
}
.data-row.done .qcell::after{
  content:" ✓";
  color:#16a34a;
  font-weight:bold;
}
.qcell{
  font-weight:bold;
  color:#111827;
  background:#fffaf0;
}
.dropcell{
  color:#0f172a;
  background:#fff;
}
.dropcell.empty{
  color:#94a3b8;
}
.dropcell.active{
  outline:3px solid #64748b;
  outline-offset:-4px;
  background:#f8fafc;
}
.dropcell.correct{
  background:#dcfce7!important;
  color:#14532d;
}
.dropcell.wrong{
  background:#fee2e2!important;
  color:#7f1d1d;
}
.samecell{
  font-weight:bold;
  color:#1e3a8a;
}

.report{
  min-height:0;
  background:rgba(255,245,250,.95);
  border:3px solid #d8b4fe;
  border-radius:22px;
  padding:14px;
  box-shadow:0 8px 20px rgba(15,23,42,.12);
  display:flex;
  flex-direction:column;
}
.report-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  border-bottom:3px solid #dbeafe;
  padding-bottom:8px;
  margin-bottom:10px;
}
.report-title{
  font-size:30px;
  font-weight:bold;
  color:#1e3a8a;
}
.report-number{
  font-size:24px;
  color:#64748b;
}
.report-card{
  flex:1 1 auto;
  min-height:0;
  background:linear-gradient(180deg,#f8fafc,#ffffff);
  border:2px solid #cbd5e1;
  border-radius:18px;
  padding:14px;
  display:flex;
  align-items:center;
}
.report-text{
  font-size:38px;
  line-height:1.45;
  font-weight:800;
  color:#0f172a;
}
.report-empty{
  color:#64748b;
  font-size:31px;
  font-weight:bold;
}



.bank{
  min-height:92px;
  background:rgba(236,253,245,.95);
  border:3px solid #a7f3d0;
  border-radius:20px;
  padding:9px 12px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:9px;
  flex-wrap:wrap;
  box-shadow:0 8px 18px rgba(15,23,42,.10);
}
.bank-label{
  width:100%;
  text-align:center;
  font-size:22px;
  color:#475569;
  font-weight:bold;
}
.chip{
  border:3px solid #94a3b8;
  background:#fff;
  border-radius:999px;
  padding:7px 15px;
  font-size:27px;
  font-weight:bold;
  color:#0f172a;
  white-space:nowrap;
  box-shadow:0 3px 8px rgba(15,23,42,.11);
}
.chip:hover{
  background:#eff6ff;
}
.msg{
  min-height:28px;
  text-align:center;
  font-size:25px;
  font-weight:bold;
}
.ok{color:#16a34a}
.no{color:#dc2626}

@media(max-height:760px){
  h1{font-size:36px}
  .top-btn{font-size:20px;padding:6px 13px}
  
  .workspace{grid-template-columns:1fr 390px}
  .sheet{padding:9px}
  .sheet-title strong{font-size:27px}
  .sheet-title span{font-size:20px}
  .table{grid-template-rows:40px repeat(6,1fr)}
  .head .cell{font-size:23px}
  .cell{font-size:22px;padding:4px 7px}
  .report-title{font-size:27px}
  .report-text{font-size:33px}
  .report-empty{font-size:28px}
  .bank{min-height:82px;padding:7px 10px}
  .chip{font-size:24px;padding:6px 12px}
  .bank-label{font-size:20px}
}

/* embedded tropical background + pastel differentiated panels */
.sheet{
  background:rgba(255,251,240,.90) !important;   /* soft cream */
  border-color:#ead7a4 !important;
  box-shadow:0 8px 20px rgba(120,90,40,.12) !important;
}
.table{
  background:rgba(255,253,247,.96) !important;
  border-color:#d6c7a1 !important;
}
.head .cell{
  background:#f8edd1 !important;
}
.qcell{
  background:#fff8e8 !important;
}

.report{
  background:rgba(252,244,255,.92) !important;   /* soft lilac-pink */
  border-color:#d8b4fe !important;
}
.report-top{
  border-bottom-color:#edd5ff !important;
}
.report-card{
  background:linear-gradient(180deg,#fff7fb,#ffffff) !important;
  border-color:#e9d5ff !important;
}
.report-title{
  color:#7c3aed !important;
}

.bank{
  background:rgba(236,253,245,.93) !important;   /* soft mint */
  border-color:#a7f3d0 !important;
}
.bank-label{
  color:#0f766e !important;
}

.chip{
  background:#ffffff !important;
  border-color:#86efac !important;
}
.chip:hover{
  background:#f0fdf4 !important;
}

.sheet-title strong{
  color:#8a5b12 !important;
}
.report-number{
  color:#8b5cf6 !important;
}

/* light backdrop effect for readability over image */
.sheet, .report, .bank{
  backdrop-filter:blur(1.5px);
}

</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>采访表：我跟他一样不一样</h1>
    <div class="actions">
      <button class="top-btn save" onclick="saveCard()">保存卡片</button>
      <button class="top-btn speak" onclick="speakFull()">朗读</button>
      <button class="top-btn stop" onclick="stopAudio()">停止</button>
      <button class="top-btn check" onclick="checkActive()">检查</button>
      <button class="top-btn reset" onclick="resetActive()">重做</button>
    </div>
  </header>

  
  <div class="workspace">
    <section class="sheet">
      <div class="sheet-title">
        <strong>小组采访表</strong>
        
      </div>

      <div class="table" id="table">
        <div class="row head">
          <div class="cell">问题</div>
          <div class="cell">他的情况</div>
          <div class="cell">我跟他</div>
          <div class="cell">我的情况</div>
        </div>
      </div>
    </section>

    <aside class="report">
      <div class="report-top">
        <div class="report-title">我的小报告</div>
        <div class="report-number" id="reportNumber">第 1 题</div>
      </div>
      <div class="report-card">
        <div class="report-text report-empty" id="reportText">请先完成表格中的一行。</div>
      </div>

    </aside>
  </div>

  <div class="bank" id="bank">
    <div class="bank-label">先点一个空格</div>
  </div>

  <div class="msg" id="msg"></div>
</div>

  {

    his:[["bread","他说他早上吃面包和鸡蛋。"],["baozi","他说他早上吃包子。"],["noodle","他说他早上吃面条。"]],
    mine:[["bread","我早上吃面包和鸡蛋。"],["baozi","我早上吃包子。"],["noodle","我早上吃面条。"]]
  },
  {
    id:"lunch", q:"中午去哪儿吃饭？", ask:"你中午去哪儿吃饭？", report:"我问他中午去哪儿吃饭。",
    his:[["school","他说他去学校食堂吃饭。"],["home","他说他回家吃饭。"],["restaurant","他说他去饭店吃饭。"]],
    mine:[["school","我去学校食堂吃饭。"],["home","我回家吃饭。"],["restaurant","我去饭店吃饭。"]]
  },
  {
    id:"sport", q:"怎么锻炼身体？", ask:"你怎么锻炼身体？", report:"我问他怎么锻炼身体。",
    his:[["run","他说他每天跑步。"],["swim","他说他每天游泳。"],["basketball","他说他常常打篮球。"]],
    mine:[["run","我每天跑步。"],["swim","我每天游泳。"],["basketball","我常常打篮球。"]]
  },
  {
    id:"interest", q:"对什么感兴趣？", ask:"你对什么感兴趣？", report:"我问他对什么感兴趣。",
    his:[["basketball","他说他对篮球感兴趣。"],["music","他说他对音乐感兴趣。"],["chinese","他说他对汉语感兴趣。"]],
    mine:[["basketball","我对篮球感兴趣。"],["music","我对音乐感兴趣。"],["chinese","我对汉语感兴趣。"]]
  },
  {
    id:"review", q:"每天复习多长时间？", ask:"你每天复习多长时间？", report:"我问他每天复习多长时间。",
    his:[["1","他说他每天复习一个小时。"],["2","他说他每天复习两个小时。"],["3","他说他每天复习三个小时。"]],
    mine:[["1","我每天复习一个小时。"],["2","我每天复习两个小时。"],["3","我每天复习三个小时。"]]
  }
];

const SAME = [["same","我跟他一样。"],["diff","我跟他不一样。"]];

let activeRow = 0;
let activeCell = null;

function build(){
  const table = document.getElementById("table");
  DATA.forEach((item, i)=>{
    const row = document.createElement("div");
    row.className = "row data-row" + (i===0 ? " active" : "");
    row.dataset.row = i;
    row.innerHTML = `
      <div class="cell qcell">${item.q}</div>
      <div class="cell dropcell empty" data-row="${i}" data-slot="his">点这里</div>
      <div class="cell dropcell samecell empty" data-row="${i}" data-slot="same">点这里</div>
      <div class="cell dropcell empty" data-row="${i}" data-slot="mine">点这里</div>
    `;
    table.appendChild(row);
  });

  document.querySelectorAll(".data-row").forEach(row=>{
    row.addEventListener("click", e=>{
      activeRow = Number(row.dataset.row);
      setActiveRow(activeRow);
      if(e.target.classList.contains("dropcell")) setActiveCell(e.target);
      updateReport();
    });
  });

  document.querySelectorAll(".dropcell").forEach(cell=>{
    cell.addEventListener("click", e=>{
      e.stopPropagation();
      activeRow = Number(cell.dataset.row);
      setActiveRow(activeRow);
      setActiveCell(cell);
      updateReport();
    });
  });

  updateReport();
}

function setActiveRow(i){
  document.querySelectorAll(".data-row").forEach(r=>r.classList.toggle("active", Number(r.dataset.row)===i));
  document.getElementById("reportNumber").textContent = "第 " + (i+1) + " 题";
}

function setActiveCell(cell){
  activeCell = cell;
  document.querySelectorAll(".dropcell").forEach(c=>c.classList.remove("active"));
  cell.classList.add("active");
  renderBank(Number(cell.dataset.row), cell.dataset.slot);
}

function optionsFor(row, slot){
  const item = DATA[row];
  if(slot === "his") return item.his;
  if(slot === "same") return SAME;
  return item.mine;
}

function renderBank(row, slot){
  const bank = document.getElementById("bank");
  bank.innerHTML = "";
  const label = document.createElement("div");
  label.className = "bank-label";
  label.textContent = slot === "his" ? "选择：他的情况" : slot === "same" ? "选择：我跟他一样 / 不一样" : "选择：我的情况";
  bank.appendChild(label);

  optionsFor(row, slot).forEach(([key,text])=>{
    const b = document.createElement("button");
    b.className = "chip";
    b.textContent = text;
    b.onclick = ()=>choose(key,text);
    bank.appendChild(b);
  });
}

function choose(key,text){
  if(!activeCell) return;
  activeCell.textContent = text;
  activeCell.dataset.key = key;
  activeCell.dataset.value = text;
  activeCell.classList.remove("empty","correct","wrong");
  updateReport();
}

function cells(row){
  return {
    his:document.querySelector(`.dropcell[data-row="${row}"][data-slot="his"]`),
    same:document.querySelector(`.dropcell[data-row="${row}"][data-slot="same"]`),
    mine:document.querySelector(`.dropcell[data-row="${row}"][data-slot="mine"]`)
  };
}

function reportText(row){
  const item = DATA[row];
  const c = cells(row);
  const his = c.his.dataset.value || "……";
  const same = c.same.dataset.value || "……";
  let mine = c.mine.dataset.value || "……";

  if(c.same.dataset.key === "same" && mine.startsWith("我")){
    mine = "我也" + mine.slice(1);
  }

  return item.report + his + same + mine;
}

function updateReport(){
  const item = DATA[activeRow];
  const c = cells(activeRow);

  const text = reportText(activeRow);
  const report = document.getElementById("reportText");
  report.textContent = text.includes("……") ? "还没有完成：" + text : text;
  report.classList.toggle("report-empty", text.includes("……"));
}

function checkActive(){
  const c = cells(activeRow);
  [c.his,c.same,c.mine].forEach(x=>x.classList.remove("correct","wrong"));

  let score = 0;
  if(c.his.dataset.key){ c.his.classList.add("correct"); score++; } else c.his.classList.add("wrong");
  if(c.mine.dataset.key){ c.mine.classList.add("correct"); score++; } else c.mine.classList.add("wrong");

  const hisKey = c.his.dataset.key || "";
  const mineKey = c.mine.dataset.key || "";
  const sameKey = c.same.dataset.key || "";
  const should = hisKey && mineKey && hisKey === mineKey ? "same" : "diff";

  if(sameKey && hisKey && mineKey && sameKey === should){
    c.same.classList.add("correct"); score++;
  }else{
    c.same.classList.add("wrong");
  }

  const row = document.querySelector(`.data-row[data-row="${activeRow}"]`);
  row.classList.toggle("done", score===3);

  document.getElementById("msg").innerHTML = score === 3
    ? '<span class="ok">这一行全对！</span>'
    : '<span class="no">答对 ' + score + ' / 3。请再试一试。</span>';
}

function resetActive(){
  const c = cells(activeRow);
  [c.his,c.same,c.mine].forEach(cell=>{
    cell.textContent = "点这里";
    cell.dataset.key = "";
    cell.dataset.value = "";
    cell.className = cell.className.replace(/\bcorrect\b|\bwrong\b/g,"");
    cell.classList.add("empty");
  });
  document.querySelector(`.data-row[data-row="${activeRow}"]`).classList.remove("done");
  updateReport();
  document.getElementById("msg").innerHTML = "";
}

function speakText(text){
  if(!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "zh-CN";
  u.rate = 0.88;
  window.speechSynthesis.speak(u);
}
function speakFull(){
  speakText(reportText(activeRow));
}
function stopAudio(){
  if("speechSynthesis" in window) window.speechSynthesis.cancel();
}

function wrapText(ctx,text,x,y,maxWidth,lineHeight){
  const chars = Array.from(text);
  let line = "";
  let lines = [];
  chars.forEach(ch=>{
    const test = line + ch;
    if(ctx.measureText(test).width > maxWidth && line){
      lines.push(line);
      line = ch;
    }else line = test;
  });
  if(line) lines.push(line);
  lines.forEach((ln,i)=>ctx.fillText(ln,x,y+i*lineHeight));
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function saveCard(){
  const item = DATA[activeRow];
  const text = reportText(activeRow);

  const canvas = document.createElement("canvas");
  canvas.width = 1300;
  canvas.height = 820;
  const ctx = canvas.getContext("2d");

  const grad = ctx.createLinearGradient(0,0,1300,820);
  grad.addColorStop(0,"#eef2ff");
  grad.addColorStop(.55,"#ffffff");
  grad.addColorStop(1,"#ecfeff");
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,1300,820);

  ctx.fillStyle = "rgba(255,255,255,.97)";
  roundRect(ctx,70,70,1160,680,36);
  ctx.fill();
  ctx.strokeStyle = "#93c5fd";
  ctx.lineWidth = 8;
  roundRect(ctx,70,70,1160,680,36);
  ctx.stroke();

  ctx.font = 'bold 64px "KaiTi","STKaiti","Microsoft YaHei",serif';
  ctx.fillStyle = "#1e3a8a";
  ctx.fillText("采访小报告",120,155);

  ctx.font = 'bold 50px "KaiTi","STKaiti","Microsoft YaHei",serif';
  ctx.fillStyle = "#0f172a";
  ctx.fillText(item.ask,120,245);

  ctx.font = '48px "KaiTi","STKaiti","Microsoft YaHei",serif';
  ctx.fillStyle = "#0f172a";
  wrapText(ctx,text,120,345,1020,72);

  ctx.font = '28px "KaiTi","STKaiti","Microsoft YaHei",serif';
  ctx.fillStyle = "#64748b";
  ctx.fillText("A跟B一样 / 不一样",120,685);

  const a = document.createElement("a");
  a.download = "采访小报告_" + item.id + ".png";
  a.href = canvas.toDataURL("image/png");
  a.click();
}

build();
</script>
