    background-position:center center;
    background-size:cover;
    background-repeat:no-repeat;
    background-attachment:fixed;
    color:var(--ink);
    min-height:100vh;
  }
  .wrap{max-width:1040px;margin:0 auto;padding:14px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
  h1{margin:0;font-size:36px;letter-spacing:1px;color:#9a3412}
  .tag{font-size:18px;color:var(--muted)}
  .tabs{display:flex;gap:10px;margin-bottom:12px}
  button{
    border:3px solid #ffffff;border-radius:14px;padding:10px 18px;font-size:22px;
    font-family:inherit;cursor:pointer;background:#2563eb;color:#ffffff;
    box-shadow:0 6px 16px rgba(0,0,0,.18);
  }
  button.active{background:#f97316;color:#fff}
  .panel{
    display:none;background:#fffdf7;border:3px solid #ffffff;
    border-radius:22px;padding:16px 14px;box-shadow:0 10px 28px rgba(0,0,0,.18)
  }
  .panel.active{display:block}
  h2{font-size:28px;margin:0 0 12px;color:#166534}
  .formula{
    font-size:38px;text-align:center;background:#fff1a8;border:3px solid #f59e0b;
    border-radius:20px;padding:14px;margin:10px 0 14px;color:#7c2d12;
  }
  .note{font-size:24px;line-height:1.5;margin:8px 0}
  .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}
  .ex{font-size:24px;line-height:1.45;background:#e0f2fe;border:3px solid #38bdf8;border-radius:16px;padding:12px}
  .small{font-size:18px;color:var(--muted)}

  .bank{
    display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
    margin:0 0 12px;padding:10px;background:#ffffff;
    border:3px solid #7c3aed;border-radius:16px;min-height:56px;
  }
  .chip{
    display:inline-flex;align-items:center;justify-content:center;
    font-size:26px;background:#fde047;border:3px solid #f97316;border-radius:999px;
    padding:6px 12px;color:#7c2d12;cursor:grab;user-select:none;
    transition:.15s transform ease,.15s box-shadow ease;
  }
  .chip:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(124,45,18,.1)}
  .chip.dragging{opacity:.55}

  .practice{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 430px));
    justify-content:center;
    gap:10px 14px;
  }
  .q{
    background:#fff7a8;border:3px solid #ef4444;border-radius:16px;
    padding:10px 12px;width:430px;max-width:430px;
  }
  .q.center{grid-column:1 / -1;justify-self:center}
  .qline{
    font-size:30px;line-height:1.35;display:flex;flex-wrap:nowrap;
    align-items:center;gap:5px;white-space:nowrap;
  }
  .prefix,.suffix,.end{white-space:nowrap;flex:0 0 auto}
  .drop{
    width:126px;min-width:126px;min-height:44px;padding:4px 6px;
    border:3px dashed #2563eb;border-radius:12px;background:#ffffff;display:inline-flex;
    align-items:center;justify-content:center;vertical-align:middle;flex:0 0 auto;
  }
  .drop.over{background:#dbeafe;border-color:#2563eb}
  .drop.correct{border-style:solid;border-color:#16a34a;background:#dcfce7}
  .drop.wrong{border-style:solid;border-color:#dc2626;background:#fee2e2}
  .placeholder{font-size:18px;color:#9ca3af}
  .result{font-size:19px;margin-top:5px;min-height:22px;text-align:center}
  .ok{color:var(--accent2);font-weight:bold}
  .no{color:var(--bad);font-weight:bold}
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;justify-content:center}
  .check{background:#16a34a;color:#fff;border:3px solid #ffffff}
  .reset{background:#ec4899;color:#fff;border:3px solid #ffffff}
  .ex,.q{position:relative}
  .ex{padding-right:58px}
  .q{padding-right:58px}
  .speak-btn{
    position:absolute;top:8px;right:8px;width:40px;height:40px;min-width:40px;
    padding:0;border-radius:999px;border:3px solid #ffffff;background:#7c3aed;
    color:#ffffff;font-size:18px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 10px rgba(0,0,0,.18);line-height:1;z-index:2;
  }
  .speak-btn:hover{background:#6d28d9}

  @media (max-width:760px){
    .grid{grid-template-columns:1fr}
    .practice{grid-template-columns:1fr}
    .q,.q.center{width:100%;max-width:100%}
    .qline{font-size:25px}
    .drop{width:102px;min-width:102px}
    .chip{font-size:22px}
    .speak-btn{width:36px;height:36px;min-width:36px;font-size:16px;top:6px;right:6px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>越A越B</h1>
      <div class="tag">语法小卡片</div>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="grammar" data-say="语法">语法</button>
    <button class="tab" data-tab="practice" data-say="练习">练习</button>
  </nav>

  <section id="grammar" class="panel active">
    <h2>怎么用？</h2>
    <div class="formula">越 + A，越 + B</div>
    <p class="note"><b>意思：</b>B 跟着 A 的变化一起变化。</p>
    <p class="note"><b>A</b> 是第一个变化，<b>B</b> 是第二个变化。</p>
    <p class="note"><b>可以翻译：</b>越……越……</p>

    <div class="grid">
      <div class="ex">雨<b>越</b>下<b>越</b>大。<button class="speak-btn" onclick="speakText('雨越下越大。')">🔊</button><br><span class="small">雨下得越多，雨越大。</span></div>
      <div class="ex">你的中文<b>越</b>说<b>越</b>好。<button class="speak-btn" onclick="speakText('你的中文越说越好。')">🔊</button><br><span class="small">说得越多，中文越好。</span></div>
      <div class="ex"><b>越</b>往南，天气<b>越</b>热。<button class="speak-btn" onclick="speakText('越往南，天气越热。')">🔊</button><br><span class="small">越往南走，天气越热。</span></div>
      <div class="ex">山<b>越</b>高，路<b>越</b>难走。<button class="speak-btn" onclick="speakText('山越高，路越难走。')">🔊</button><br><span class="small">山越高，路越难走。</span></div>
    </div>
  </section>

  <section id="practice" class="panel">
    <div id="bank" class="bank">
      <div class="chip" draggable="true" data-text="越有意思" onclick="speakText('越有意思')">越有意思</div>
      <div class="chip" draggable="true" data-text="越开心" onclick="speakText('越开心')">越开心</div>
      <div class="chip" draggable="true" data-text="越晚回来" onclick="speakText('越晚回来')">越晚回来</div>
      <div class="chip" draggable="true" data-text="越容易" onclick="speakText('越容易')">越容易</div>
      <div class="chip" draggable="true" data-text="越快" onclick="speakText('越快')">越快</div>
    </div>

    <div class="practice">
      <div class="q">
        <button class="speak-btn" onclick="speakText('这个电影越看越有意思。')">🔊</button>
        <div class="qline">
          <span class="prefix">1. 这个电影越看</span>
          <div class="drop" data-answer="越有意思"><span class="placeholder">拖到这里</span></div>
          <span class="end">。</span>
        </div>
        <div class="result"></div>
      </div>

      <div class="q">
        <button class="speak-btn" onclick="speakText('我们越聊越开心。')">🔊</button>
        <div class="qline">
          <span class="prefix">2. 我们越聊</span>
          <div class="drop" data-answer="越开心"><span class="placeholder">拖到这里</span></div>
          <span class="end">。</span>
        </div>
        <div class="result"></div>
      </div>

      <div class="q">
        <button class="speak-btn" onclick="speakText('越晚回来，我越担心。')">🔊</button>
        <div class="qline">
          <span class="prefix">3.</span>
          <div class="drop" data-answer="越晚回来"><span class="placeholder">拖到这里</span></div>
          <span class="suffix">，我越担心。</span>
        </div>
        <div class="result"></div>
      </div>

      <div class="q">
        <button class="speak-btn" onclick="speakText('汉语越学越容易。')">🔊</button>
        <div class="qline">
          <span class="prefix">4. 汉语越学</span>
          <div class="drop" data-answer="越容易"><span class="placeholder">拖到这里</span></div>
          <span class="end">。</span>
        </div>
        <div class="result"></div>
      </div>

      <div class="q center">
        <button class="speak-btn" onclick="speakText('他越跑越快。')">🔊</button>
        <div class="qline">
          <span class="prefix">5. 他越跑</span>
          <div class="drop" data-answer="越快"><span class="placeholder">拖到这里</span></div>
          <span class="end">。</span>
        </div>
        <div class="result"></div>
      </div>
    </div>

    <div class="actions">
      <button class="check" onclick="speakText('检查'); checkAll()">检查</button>
      <button class="reset" onclick="speakText('重做'); resetAll()">重做</button>
    </div>
  </section>
</div>

<script>

  function speakText(text){
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    u.rate = 0.85;
    u.pitch = 1;
    window.speechSynthesis.speak(u);
  }

  document.querySelectorAll('.tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      speakText(btn.dataset.say || btn.textContent.trim());
      document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');
    });
  });

  let draggedChip = null;

  function makeDraggable(chip){
    chip.addEventListener('dragstart', e=>{
      draggedChip = chip;
      chip.classList.add('dragging');
      e.dataTransfer.setData('text/plain', chip.dataset.text || chip.textContent.trim());
      e.dataTransfer.effectAllowed = 'move';
    });
    chip.addEventListener('dragend', ()=>{
      chip.classList.remove('dragging');
      draggedChip = null;
    });
  }

  document.querySelectorAll('.chip').forEach(makeDraggable);

  function clearDropState(drop){
    drop.classList.remove('correct','wrong','over');
    const q = drop.closest('.q');
    if(q) q.querySelector('.result').innerHTML = '';
  }

  function placeChip(drop, chip){
    const oldChip = drop.querySelector('.chip');
    const bank = document.getElementById('bank');
    if(oldChip) bank.appendChild(oldChip);
    const ph = drop.querySelector('.placeholder');
    if(ph) ph.remove();
    drop.appendChild(chip);
    speakText(chip.dataset.text);
    clearDropState(drop);
  }

  document.querySelectorAll('.drop').forEach(drop=>{
    drop.addEventListener('dragover', e=>{e.preventDefault();drop.classList.add('over');});
    drop.addEventListener('dragleave', ()=>drop.classList.remove('over'));
    drop.addEventListener('drop', e=>{
      e.preventDefault();
      drop.classList.remove('over');
      if(draggedChip) placeChip(drop, draggedChip);
    });
  });

  const bank = document.getElementById('bank');
  bank.addEventListener('dragover', e=>e.preventDefault());
  bank.addEventListener('drop', e=>{
    e.preventDefault();
    if(draggedChip){
      bank.appendChild(draggedChip);
      document.querySelectorAll('.drop').forEach(drop=>{
        if(!drop.querySelector('.chip') && !drop.querySelector('.placeholder')){
          drop.innerHTML = '<span class="placeholder">拖到这里</span>';
        }
        clearDropState(drop);
      });
    }
  });

  function checkAll(){
    document.querySelectorAll('.drop').forEach(drop=>{
      const chip = drop.querySelector('.chip');
      const res = drop.closest('.q').querySelector('.result');
      drop.classList.remove('correct','wrong');
      if(!chip){
        res.innerHTML = '<span class="no">还没完成。</span>';
        speakText('还没完成');
        return;
      }
      if(chip.dataset.text === drop.dataset.answer){
        drop.classList.add('correct');
        res.innerHTML = '<span class="ok">对！</span>';
        speakText('对');
      }else{
        drop.classList.add('wrong');
        res.innerHTML = '<span class="no">再试一次。</span>';
        speakText('再试一次');
      }
    });
  }

  function resetAll(){
    const bank = document.getElementById('bank');
    document.querySelectorAll('.drop').forEach(drop=>{
      const chip = drop.querySelector('.chip');
      if(chip) bank.appendChild(chip);
      drop.classList.remove('correct','wrong','over');
      if(!drop.querySelector('.placeholder')){
        drop.innerHTML = '<span class="placeholder">拖到这里</span>';
      }
      drop.closest('.q').querySelector('.result').innerHTML = '';
    });
  }
</script>
</body>
</html>
