.wrap{
  max-width:1420px;
  margin:0 auto;
  padding:8px 12px;
}
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:2px;
}
h1{
  margin:0;
  font-size:40px;
  color:#1e3a8a;
}
.top-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
button{
  font-family:inherit;
}
.top-btn{
  font-size:21px;
  border:0;
  border-radius:16px;
  padding:7px 16px;
  color:#fff;
  cursor:pointer;
  box-shadow:0 5px 14px rgba(15,23,42,.16);
}
.speak{background:#2563eb}
.stop{background:#6d28d9}
.reset{background:#f97316}
.check{background:#16a34a}
.tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin:4px 0 8px;
}
.tab{
  font-size:20px;
  font-weight:bold;
  border:3px solid #fff;
  border-radius:16px;
  padding:6px 12px;
  background:#fff7a8;
  color:#1e3a8a;
  cursor:pointer;
  box-shadow:0 5px 12px rgba(15,23,42,.12);
}
.tab.active{
  background:#2563eb;
  color:#fff;
}
.card{
  background:rgba(255,255,255,.86);backdrop-filter:blur(1.5px);
  border:3px solid #fff;
  border-radius:14px;
  padding:12px 14px;
  box-shadow:0 10px 26px rgba(15,23,42,.14);
}
.panel{display:none}
.panel.active{display:block}
.task{
  display:grid;
  grid-template-columns:250px 1fr;
  gap:10px;
  align-items:stretch;
}
.behavior{
  background:#e0f2fe;
  border:4px solid #38bdf8;
  border-radius:14px;
  padding:8px 10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  min-height:250px;
}
.icon{
  font-size:64px;
  margin-bottom:8px;
}
.behavior-title{
  font-size:28px;
  line-height:1.25;
  color:#075985;
  font-weight:bold;
}
.answer-area{
  display:grid;
  grid-template-rows:auto auto auto;
  gap:8px;
}
.slot-card{
  position:relative;

<script>

    slots:{

      ],
      reason:[
        "因为越锻炼，身体越好。",

    }
  },
  {
    id:"help",
    tab:"4 帮助",
    icon:"🤝",
    title:"总是帮助同学。",
    slots:{
      judge:[
        "我觉得这样很好。",
        "这是一个好习惯。",
        "我觉得这样很好，因为他很热心。"
      ],
      reason:[
        "因为越帮助同学，朋友越多。",
        "因为越帮助别人，自己越开心。",
        "因为越帮助同学，同学越喜欢你。"
      ],
      advice:[
        "所以我们应该多帮助同学。",
        "所以我们应该关心别人。",

  },
  {
    id:"fruit",
    tab:"5 水果",
    icon:"🍎",
    title:"吃很多水果。",
    slots:{
      judge:[
        "我觉得这样很好。",
        "这是一个好习惯。",
        "我觉得这样对身体好。"
      ],
      reason:[
        "因为水果吃得越多，身体越健康。",
        "因为吃水果越多，皮肤越好。",

      ],
      advice:[

  },
  {
    id:"chat",
    tab:"6 聊天",
    icon:"💬",
    title:"用中文跟朋友聊天儿。",
    slots:{
      judge:[
        "我觉得这样很好。",
        "这是一个好办法。",
        "我觉得这样对学习中文很有帮助。"
      ],
      reason:[
        "因为越用中文聊天儿，中文说得越好。",
        "因为越用中文聊天儿，越有信心。",
        "因为越用中文聊天儿，越了解朋友。"
      ],
      advice:[
        "所以我们应该多用中文聊天儿。",
        "所以我们应该多说中文。",
        "所以我们应该用中文跟朋友交流。"
      ]
    }
  }
];

const slotNames = {
  judge:"判断",
  reason:"原因：越A越B",
  advice:"建议 / 总结"
};

let current = DATA[0].id;
let activeDrop = null;
let draggedText = null;

function build(){
  const tabs = document.getElementById("tabs");
  const panels = document.getElementById("panels");

  DATA.forEach((item, idx)=>{
    const tab = document.createElement("button");
    tab.className = "tab" + (idx===0 ? " active" : "");
    tab.textContent = item.tab;
    tab.dataset.id = item.id;
    tab.onclick = ()=>switchTab(item.id);
    tabs.appendChild(tab);

    const panel = document.createElement("section");
    panel.className = "panel" + (idx===0 ? " active" : "");
    panel.id = "panel-" + item.id;
    panel.innerHTML = `
      <div class="task">
        <div class="behavior">
          <div class="icon">${item.icon}</div>
          <div class="behavior-title">${item.title}</div>
        </div>
        <div class="answer-area">
          ${["judge","reason","advice"].map(key=>`
            <div class="slot-card" data-panel="${item.id}" data-slot="${key}">
              <button class="sound-btn" onclick="event.stopPropagation(); speakSlot('${item.id}','${key}')">🔊</button>
              <div class="slot-label">${slotNames[key]}</div>
              <div class="drop" data-panel="${item.id}" data-slot="${key}" data-answers="${item.slots[key].join('|')}"></div>
            </div>
          `).join("")}
        </div>
      </div>
      <div class="result-card" id="card-${item.id}">
        <div class="result-title">我的小卡片：${item.title}</div>
        <div class="result-text result-empty" id="cardtext-${item.id}">先完成上面的三个部分。</div>
      </div>
    `;
    panels.appendChild(panel);
  });

  initEvents();
}

function switchTab(id){
  current = id;
  activeDrop = null;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t.dataset.id===id));
  document.querySelectorAll(".panel").forEach(p=>p.classList.toggle("active", p.id==="panel-"+id));
  document.querySelectorAll(".slot-card,.drop").forEach(el=>el.classList.remove("active","over"));
  document.getElementById("bank").innerHTML = '<div class="hint">先点一个空格</div>';
  document.getElementById("msg").innerHTML = "";
}

function initEvents(){
  document.querySelectorAll(".slot-card").forEach(card=>{
    card.addEventListener("click",()=>{
      const drop = card.querySelector(".drop");
      setActive(drop);
    });
  });

  document.querySelectorAll(".drop").forEach(drop=>{
    drop.addEventListener("dragover",e=>{
      e.preventDefault();
      drop.classList.add("over");
    });
    drop.addEventListener("dragleave",()=>drop.classList.remove("over"));
    drop.addEventListener("drop",e=>{
      e.preventDefault();
      drop.classList.remove("over");
      const text = e.dataTransfer.getData("text/plain") || draggedText;
      if(!text) return;
      setActive(drop);
      const item = getItem(drop.dataset.panel);
      const opts = item.slots[drop.dataset.slot];
      if(opts.includes(text)) choose(drop,text);
    });
  });
}

function getItem(id){
  return DATA.find(x=>x.id===id);
}

function setActive(drop){
  activeDrop = drop;
  const panelId = drop.dataset.panel;
  const slot = drop.dataset.slot;
  document.querySelectorAll(".slot-card,.drop").forEach(el=>el.classList.remove("active"));
  drop.classList.add("active");
  drop.closest(".slot-card").classList.add("active");
  renderBank(panelId,slot);
}

function renderBank(panelId,slot){
  const item = getItem(panelId);
  const bank = document.getElementById("bank");
  bank.innerHTML = "";
  item.slots[slot].forEach(text=>{
    const chip = document.createElement("div");
    chip.className = "chip";
    chip.draggable = true;
    chip.textContent = text;
    chip.dataset.text = text;
    chip.onclick = ()=>choose(activeDrop,text);
    chip.addEventListener("dragstart",e=>{
      draggedText = text;
      e.dataTransfer.setData("text/plain",text);
    });
    chip.addEventListener("dragend",()=>draggedText=null);
    bank.appendChild(chip);
  });
}

function choose(drop,text){
  if(!drop) return;
  drop.textContent = text;
  drop.dataset.value = text;
  drop.classList.remove("correct","wrong");
  updateMiniText(drop.dataset.panel);
}

function updateMiniText(id){
  const panel = document.getElementById("panel-" + id);
  const parts = [...panel.querySelectorAll(".drop")].map(d=>d.dataset.value || "……");
  const text = parts.join("");
  const cardText = document.getElementById("cardtext-" + id);
  cardText.textContent = text.includes("……") ? "还没有完成：" + text : text;
  cardText.classList.toggle("result-empty", text.includes("……"));
}

function speakText(text){
  if(!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "zh-CN";
  u.rate = 0.86;
  window.speechSynthesis.speak(u);
}

function stopAudio(){
  if("speechSynthesis" in window) window.speechSynthesis.cancel();
}

function speakSlot(panelId,slot){
  const drop = document.querySelector(`.drop[data-panel="${panelId}"][data-slot="${slot}"]`);
  setActive(drop);
  speakText(drop.dataset.value || "请选择。");
}

function speakFull(){
  const panel = document.getElementById("panel-" + current);
  const drops = [...panel.querySelectorAll(".drop")];
  const text = drops.map(d=>d.dataset.value || "……").join("");
  speakText(text);
}

function checkCurrent(){
  const panel = document.getElementById("panel-" + current);
  const drops = [...panel.querySelectorAll(".drop")];
  let correct = 0;
  drops.forEach(drop=>{
    drop.classList.remove("correct","wrong");
    const value = drop.dataset.value || "";
    const answers = drop.dataset.answers.split("|");
    if(value && answers.includes(value)){
      drop.classList.add("correct");
      correct++;
    }else{
      drop.classList.add("wrong");
    }
  });

  const msg = document.getElementById("msg");
  if(correct === drops.length){
    msg.innerHTML = '<span class="ok">这一页全对！</span>';
  }else{
    msg.innerHTML = '<span class="no">答对 ' + correct + ' / ' + drops.length + '。再试一次。</span>';
  }
}

function resetCurrent(){
  const panel = document.getElementById("panel-" + current);
  panel.querySelectorAll(".drop").forEach(drop=>{
    drop.textContent = "";
    drop.dataset.value = "";
    drop.classList.remove("correct","wrong","active","over");
  });
  panel.querySelectorAll(".slot-card").forEach(card=>card.classList.remove("active"));
  document.getElementById("cardtext-" + current).textContent = "先完成上面的三个部分。";
  document.getElementById("cardtext-" + current).classList.add("result-empty");
  document.getElementById("bank").innerHTML = '<div class="hint">先点一个空格</div>';
  document.getElementById("msg").innerHTML = "";
  activeDrop = null;
  stopAudio();
}


function wrapText(ctx, text, x, y, maxWidth, lineHeight){
  const chars = Array.from(text);
  let line = "";
  const lines = [];
  chars.forEach(ch=>{
    const testLine = line + ch;
    if(ctx.measureText(testLine).width > maxWidth && line){
      lines.push(line);
      line = ch;
    }else{
      line = testLine;
    }
  });
  if(line) lines.push(line);
  lines.forEach((ln,i)=>ctx.fillText(ln, x, y + i * lineHeight));
  return y + lines.length * lineHeight;
}

function saveCard(){
  const item = getItem(current);
  const panel = document.getElementById("panel-" + current);
  const parts = [...panel.querySelectorAll(".drop")].map(d=>d.dataset.value || "……");
  const text = parts.join("");
  const canvas = document.createElement("canvas");
  canvas.width = 1200;
  canvas.height = 760;
  const ctx = canvas.getContext("2d");

  const grad = ctx.createLinearGradient(0,0,1200,760);
  grad.addColorStop(0,"#fff7ed");
  grad.addColorStop(0.55,"#eff6ff");
  grad.addColorStop(1,"#dcfce7");
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,1200,760);

  ctx.fillStyle = "rgba(255,255,255,.88)";
  roundRect(ctx,60,60,1080,640,36);
  ctx.fill();

  ctx.strokeStyle = "#f59e0b";
  ctx.lineWidth = 8;
  roundRect(ctx,60,60,1080,640,36);
  ctx.stroke();

  ctx.font = 'bold 64px "KaiTi","STKaiti","Microsoft YaHei",serif';
  ctx.fillStyle = "#7c2d12";
  ctx.fillText("越A越B：我的小短文", 120, 150);

  ctx.font = 'bold 56px "KaiTi","STKaiti","Microsoft YaHei",serif';
  ctx.fillStyle = "#075985";
  ctx.fillText(item.icon + " " + item.title, 120, 245);

  ctx.font = '48px "KaiTi","STKaiti","Microsoft YaHei",serif';
  ctx.fillStyle = "#102a43";
  wrapText(ctx, text, 120, 345, 960, 72);

  ctx.font = '30px "KaiTi","STKaiti","Microsoft YaHei",serif';
  ctx.fillStyle = "#64748b";
  ctx.fillText("说一说 · 越A越B", 120, 650);

  const a = document.createElement("a");
  a.download = "越A越B_小卡片_" + current + ".png";
  a.href = canvas.toDataURL("image/png");
  a.click();
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
