.page{
  max-width:1220px;
  margin:0 auto;
  background:rgba(255,255,255,.88);
  border:4px solid rgba(255,255,255,.95);
  border-radius:28px;
  padding:18px;
  box-shadow:0 18px 46px rgba(0,0,0,.24);
}
.header{
  display:flex;align-items:center;gap:14px;
  background:#ff6b00;
  color:white;border-radius:22px;padding:14px 20px;margin-bottom:14px;
  box-shadow:0 8px 20px rgba(0,0,0,.20);
}
.badge{display:none;}
h1{margin:0;font-size:32px;line-height:1.1;font-weight:900;}
.subtitle{display:none;}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px;}
.tab-btn{border:none;border-radius:18px;padding:12px;font-size:24px;font-weight:900;cursor:pointer;background:#ff6b00;color:#fff;border:3px solid #fff;box-shadow:0 6px 14px rgba(0,0,0,.24);}
.tab-btn.active{background:#ff6b00;color:#fff;border-color:#fff;box-shadow:0 6px 14px rgba(0,0,0,.24);}
.tab{display:none;grid-template-columns:205px 1fr;gap:12px;align-items:start;}
.tab.active{display:grid;}
.bank{background:rgba(255,255,255,.97);border:4px solid #d0bfff;border-radius:22px;padding:12px;box-shadow:0 10px 24px rgba(0,0,0,.18);position:sticky;top:10px;align-self:start;}
.bank-title{text-align:center;font-size:22px;font-weight:900;margin-bottom:10px;color:#5f3dc4;}
.words{display:grid;gap:10px;}
.word{border:none;border-radius:16px;background:#fff9db;border:3px solid #ffd43b;padding:10px 8px;font-size:25px;font-weight:900;cursor:grab;box-shadow:0 5px 12px rgba(0,0,0,.16);user-select:none;transition:.15s;}
.word:hover,.word.selected{transform:translateY(-2px);background:#ffec99;border-color:#fab005;}
.word:active{cursor:grabbing;transform:scale(.97);}
.work{background:rgba(255,255,255,.98);border:4px solid rgba(95,61,196,.28);border-radius:24px;padding:10px;box-shadow:0 10px 26px rgba(0,0,0,.20);}
.sentence-card{display:grid;grid-template-columns:44px 38px 1fr 70px;gap:8px;align-items:center;background:#fff;border:3px solid #e9ecef;border-radius:18px;padding:9px;margin-bottom:8px;box-shadow:0 5px 13px rgba(0,0,0,.10);}
.num{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;background:#7c4dff;color:white;border-radius:50%;font-size:20px;font-weight:900;}
.sentence{font-size:26px;font-weight:900;line-height:1.35;}
.dialogue-line{margin:2px 0;}
.drop{display:inline-flex;min-width:135px;min-height:40px;align-items:center;justify-content:center;border-bottom:4px solid #333;color:#888;margin:0 4px;padding:0 8px;vertical-align:middle;}
.drop.filled{color:#111;background:#fff3bf;border:3px solid #ffd43b;border-radius:12px;}
.drop.correct{background:#ebfbee;border:3px solid #2f9e44;color:#087f5b;}
.drop.wrong{background:#fff5f5;border:3px solid #e03131;color:#c92a2a;}
.speak,.mini-check,.big-btn{border:none;border-radius:14px;padding:10px 12px;font-size:18px;font-weight:900;cursor:pointer;color:white;box-shadow:0 5px 12px rgba(0,0,0,.18);}
.speak{background:#1565c0}.mini-check{background:#ef6c00}.big-btn.check{background:#2e7d32}.big-btn.clear{background:#6d4c41}.big-btn.speakall{background:#1565c0}.big-btn.stopaudio{background:#8e24aa}
.controls{display:flex;justify-content:flex-end;gap:8px;margin-top:8px;flex-wrap:wrap;}
.msg{min-height:26px;margin-top:8px;font-size:20px;font-weight:900;text-align:right;color:#5f3dc4;}

#tab2 .bank{padding:10px;}
#tab2 .word{font-size:23px;padding:8px 6px;}
#tab2 .sentence-card{grid-template-columns:40px 34px 1fr 66px;padding:7px 8px;margin-bottom:6px;}
#tab2 .sentence{font-size:22px;line-height:1.25;}
#tab2 .dialogue-line{margin:0;}
#tab2 .controls{margin-top:6px;gap:6px;}
#tab2 .big-btn{padding:8px 10px;font-size:16px;}
#tab2 .speak,#tab2 .mini-check{padding:8px 9px;font-size:16px;}
.star{position:fixed;font-size:26px;pointer-events:none;animation:starFall 900ms ease-out forwards;z-index:9999;}
@keyframes starFall{from{transform:translate(0,0) scale(1);opacity:1}to{transform:translate(var(--dx),var(--dy)) scale(.2) rotate(280deg);opacity:0}}
.shard{position:fixed;width:16px;height:16px;background:rgba(170,220,255,.85);border:1px solid rgba(255,255,255,.8);clip-path:polygon(50% 0,100% 80%,0 100%);pointer-events:none;animation:shatter 750ms ease-out forwards;z-index:9999;}
@keyframes shatter{from{transform:translate(0,0) rotate(0);opacity:1}to{transform:translate(var(--dx),var(--dy)) rotate(420deg);opacity:0}}
@media(max-width:900px){.tab.active{grid-template-columns:1fr}.bank{position:static}.sentence-card{grid-template-columns:42px 34px 1fr}.mini-check{grid-column:1/-1}.sentence{font-size:22px}.drop{min-width:100px}h1{font-size:24px}}
</style>
</head>

<script>
let selectedWord=null; let draggedWord=null;
document.querySelectorAll('.word').forEach(w=>{
  w.addEventListener('dragstart',e=>{draggedWord=w.dataset.word;e.dataTransfer.setData('text/plain',draggedWord)});
  w.addEventListener('click',()=>{document.querySelectorAll('.word').forEach(x=>x.classList.remove('selected'));w.classList.add('selected');selectedWord=w.dataset.word;speakText(selectedWord);});
});
document.querySelectorAll('.drop').forEach(d=>{
  d.addEventListener('dragover',e=>e.preventDefault());
  d.addEventListener('drop',e=>{e.preventDefault(); fillDrop(d,e.dataTransfer.getData('text/plain')||draggedWord);});
  d.addEventListener('click',()=>{ if(selectedWord) fillDrop(d,selectedWord); });
});
function fillDrop(drop,word){ if(!word) return; drop.textContent=word; drop.classList.remove('correct','wrong'); drop.classList.add('filled'); speakText(word); }
function switchTab(id,btn){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

  playEmbeddedSound(BAD_AUDIO_SRC);
}

function stars(x,y){ for(let i=0;i<18;i++){const s=document.createElement('div');s.className='star';s.textContent=['⭐','✨','🌟'][i%3];s.style.left=x+'px';s.style.top=y+'px';s.style.setProperty('--dx',(Math.random()*240-120)+'px');s.style.setProperty('--dy',(Math.random()*-170-30)+'px');document.body.appendChild(s);setTimeout(()=>s.remove(),950);} }
function shards(x,y){ for(let i=0;i<20;i++){const sh=document.createElement('div');sh.className='shard';sh.style.left=x+'px';sh.style.top=y+'px';sh.style.setProperty('--dx',(Math.random()*260-130)+'px');sh.style.setProperty('--dy',(Math.random()*220-110)+'px');document.body.appendChild(sh);setTimeout(()=>sh.remove(),800);} }
function checkOne(btn){ const card=btn.closest('.sentence-card'); const drop=card.querySelector('.drop'); const ok=drop.textContent.trim()===drop.dataset.answer; drop.classList.remove('correct','wrong'); drop.classList.add(ok?'correct':'wrong'); const r=card.getBoundingClientRect(); if(ok){okSound(); stars(r.left+r.width/2,r.top+20);} else {badSound(); shards(r.left+r.width/2,r.top+20);} }
function checkTab(tabId){ let total=0,correct=0; document.querySelectorAll('#'+tabId+' .drop').forEach(d=>{total++; const ok=d.textContent.trim()===d.dataset.answer; if(ok) correct++; d.classList.remove('correct','wrong'); d.classList.add(ok?'correct':'wrong');}); const msg=document.getElementById('msg-'+tabId); if(correct===total){msg.textContent='太棒了！全部正确！'; okSound(); stars(window.innerWidth/2,120);} else {msg.textContent=`答对 ${correct}/${total}，再试试看。`; badSound();} }
function clearTab(tabId){ document.querySelectorAll('#'+tabId+' .drop').forEach(d=>{d.textContent='_____'; d.className='drop';}); document.getElementById('msg-'+tabId).textContent=''; }
function stopAudio(){ if(window.speechSynthesis) speechSynthesis.cancel(); }
function speakText(text){ stopAudio(); const u=new SpeechSynthesisUtterance(text); u.lang='zh-CN'; u.rate=.85; speechSynthesis.speak(u); }
function speakTab(tabId){ const btns=[...document.querySelectorAll('#'+tabId+' .speak')]; let i=0; function next(){ if(i>=btns.length) return; const code=btns[i++].getAttribute('onclick'); const m=code.match(/speakText\('([\s\S]*?)'\)/); if(!m) return next(); const u=new SpeechSynthesisUtterance(m[1]); u.lang='zh-CN'; u.rate=.85; u.onend=()=>setTimeout(next,260); speechSynthesis.speak(u);} stopAudio(); next(); }
</script>
